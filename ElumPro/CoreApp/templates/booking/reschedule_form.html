{% extends "base.html" %}
{% block content %}
<section class="reveal py-24 bg-black min-h-screen text-white">
    <div class="max-w-2xl mx-auto px-6">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold">Change Your <span class="text-[#46B4B1]">Appointment</span></h2>
            <p class="text-gray-400 mt-2">Currently scheduled for: <span class="text-white font-semibold">{{ booking.booking_date }} at {{ booking.booking_slot }}</span></p>
        </div>

        <div class="bg-[#111] p-8 rounded-3xl border border-white/10 shadow-2xl">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-gray-500 text-sm mb-2">Select New Date</label>
                    <input type="date" id="booking_date" name="date" min="{{ today|date:'Y-m-d' }}" required 
                           class="w-full bg-black border border-gray-800 p-4 rounded-xl focus:border-[#46B4B1] outline-none transition-all">
                </div>

                <div id="slot-section" class="hidden">
                    <label class="block text-gray-500 text-sm mb-2">Available Times</label>
                    <div id="slots_container" class="grid grid-cols-3 gap-3">
                        </div>
                </div>

                <input type="hidden" name="slot" id="selected_slot">

                <button type="submit" id="update_btn" disabled 
                        class="w-full bg-[#46B4B1] py-4 rounded-xl font-bold opacity-50 cursor-not-allowed transition-all hover:bg-[#3da3a0]">
                    Update My Appointment
                </button>
            </form>
        </div>
    </div>
</section>

<script>
    const dateInput = document.getElementById('booking_date');
    const slotsContainer = document.getElementById('slots_container');
    const slotSection = document.getElementById('slot-section');
    const updateBtn = document.getElementById('update_btn');
    const slotHidden = document.getElementById('selected_slot');

    dateInput.addEventListener('change', function() {
        slotSection.classList.remove('hidden');
        slotsContainer.innerHTML = '<p class="col-span-3 text-[#46B4B1] animate-pulse">Checking slots...</p>';
        
        // Fetch new slots for the selected date
        fetch(`/get-slots/?date=${this.value}`)
            .then(res => res.json())
            .then(data => {
                slotsContainer.innerHTML = '';
                if(data.slots.length === 0) {
                    slotsContainer.innerHTML = '<p class="col-span-3 text-red-400 text-sm text-center">No slots left for this day.</p>';
                    return;
                }
                data.slots.forEach(slot => {
                    const btn = document.createElement('button');
                    btn.type = "button";
                    btn.innerText = slot;
                    btn.className = "py-3 border border-gray-800 rounded-lg hover:border-[#46B4B1] transition-all";
                    btn.onclick = () => {
                        document.querySelectorAll('#slots_container button').forEach(b => b.classList.remove('bg-[#46B4B1]', 'border-[#46B4B1]'));
                        btn.classList.add('bg-[#46B4B1]', 'border-[#46B4B1]');
                        slotHidden.value = slot;
                        updateBtn.disabled = false;
                        updateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    };
                    slotsContainer.appendChild(btn);
                });
            });
    });
</script>
{% endblock %}
