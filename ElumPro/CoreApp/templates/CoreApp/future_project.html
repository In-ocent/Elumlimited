{% load static %}
{% block block %}
<section class=" relative w-full min-h-[70vh] bg-[#0f172a] overflow-hidden">
    
    <div class="absolute inset-0 w-full h-full z-0">
        <div id="hero-slider" class="relative w-full h-full">
            <img class="slider-img absolute inset-0 w-full h-full object-cover opacity-100 transition-opacity duration-1000" 
                 src="{% static 'images/premium_photo-1748283940309-8e68a0ef23d2.avif' %}" alt="Engineering 1">
            <img class="slider-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000" 
                 src="{% static 'images/Stercas1.png' %}" alt="Engineering 2">
            <img class="slider-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000" 
                 src="{% static 'images/stercas2.png' %}" alt="Engineering 3">
            
            <div class="absolute inset-0 bg-black/50"></div>
        </div>
    </div>

    <div class="relative z-10 flex items-center h-full min-h-[70vh] px-8 sm:px-16">
        <div class="bg-gradient-to-r from-[#3da3a0]/90 to-transparent backdrop-blur-md p-8 sm:p-12 border-l-8 border-[#2a7a78] shadow-2xl max-w-2xl transform hover:scale-[1.02] transition-transform duration-500">
            
            <div class="flex items-center gap-4 mb-4">
                <span class="w-12 h-1 bg-white rounded-full"></span>
                <h2 class="text-sm sm:text-lg font-black text-white tracking-[0.2em] uppercase">
                    Services We Do
                </h2>
            </div>

            <h1 class="text-3xl sm:text-5xl md:text-6xl font-extrabold text-white leading-tight">
                Our Featured <br>
                <span class="text-[#0f172a]">Engineering</span> Services
            </h1>
            
            <p class="mt-6 text-white/80 max-w-md text-lg italic">
                Delivering precision glazing and turnkey structural solutions from Lagos to the world.
            </p>
        </div>
    </div>

    {% comment %} <div class="absolute bottom-8 right-12 z-20 flex gap-4">
        <div id="slide-indicator" class="text-white font-mono text-xl">01 / 03</div>
    </div> {% endcomment %}

</section>
<script src="{% static 'javascript/future_project.js' %}"></script>
{% endblock %}
