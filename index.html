<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;   /* correct for flex */
    height: 100vh;
    width: 100vw;
}

.container{
    width: 30rem;
    height: 300px;

    min-width: 200px;
    min-height: 200px;
    max-width: 90vw;
    max-height: 90vh;

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;

    overflow: auto;
    resize: both;

    border-radius: 1rem;
    box-shadow: 0 0 40px red inset;
}

/* triangle */
.triangle{
        width: 0;
        height:0;
        border-left: 50px solid transparent;
        border-right: 50px solid transparent;
        border-bottom: 100px solid  #ff00c3 ;
}
.rectangle{
        width: 150px;
        height:70px;
        background: blue;
        margin-bottom: 3rem;
}
.oval{
        width: 300px;
        height:200px;
        background: rgba(255, 60, 0, 0.845);
        border-radius: 50%;
        margin-bottom: 3rem;
}



</style>

<body>
    <div class="container">

        <div class="triangle"></div>

    </div>
    
</body>

<div class="reveal  relative h-[250px] w-full rounded-2xl shadow-xl
                    transition-transform duration-700 [transform-style:preserve-3d]
                    group-hover:[transform:rotateY(180deg)]">
            <!-- Front Side -->
            <div class="absolute inset-0 [backface-visibility:hidden] rounded-2xl overflow-hidden border border-white/10">
                <img src="{{ project.featured_image.url }}" 
                     alt="{{ project.title }}" class="w-full h-full object-cover">
            </div>

            <!-- Back Side -->
            <div class="absolute inset-0 [transform:rotateY(180deg)] [backface-visibility:hidden] rounded-2xl overflow-hidden">
                <img src="{{ project.secondary_image.url }}" 
                     alt="{{ project.title }}" class="w-full h-full object-cover">

                <!-- Overlay Background fades slowly -->
                <div class="absolute inset-0 bg-black/70 backdrop-blur-sm opacity-0
                            group-hover:opacity-100 transition-opacity duration-[3000ms]"></div>

                <!-- Text content centered -->
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
                    <h3 class="text-white text-2xl font-semibold opacity-0 translate-y-3
                               group-hover:opacity-100 group-hover:translate-y-0
                               transition-all duration-500 delay-1000">
                        {{ project.title }}
                    </h3>
                    <p class="text-[#46B4B1] mt-3 text-sm uppercase tracking-widest opacity-0 translate-y-3
                               group-hover:opacity-100 group-hover:translate-y-0
                               transition-all duration-500 delay-1200">
                        {{ project.category }}
                    </p>
                </div>
            </div> 

        </div>
